<header class="topbar">
  <div class="brand">
    <span class="mark">{{ '{' }} {{ '}' }}</span>
    <span>devkit</span>
    <span class="sep">/</span>
    <span class="tool">Diff Checker</span>
  </div>
  <div class="spacer"></div>
  <div class="meta">
    <span>local-only</span>
    <span class="dot"></span>
    <span>no upload</span>
  </div>
  <button
    class="icon-btn-round"
    (click)="toggleTheme()"
    title="Toggle theme"
    aria-label="Toggle theme"
  >
    <svg
      width="14"
      height="14"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="1.5"
      stroke-linecap="round"
      stroke-linejoin="round"
    >
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
    </svg>
  </button>
</header>
